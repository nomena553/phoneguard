<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhoneGuard — __DEVICE_ID__</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0a0c10;color:#f0f2f7;min-height:100vh}
.nav{background:#111318;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a2f3a;position:sticky;top:0;z-index:100}
.logo{font-size:16px;font-weight:bold;color:#fff}
.logo span{color:#ff3b3b}
.logo small{font-size:11px;color:#8b91a0;margin-left:6px}
.dot{width:8px;height:8px;background:#00d084;border-radius:50%;display:inline-block;margin-right:6px;animation:pulse 2s infinite}
.dot.off{background:#ff3b3b;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.container{max-width:600px;margin:0 auto;padding:16px}
.card{background:#111318;border:1px solid #2a2f3a;border-radius:12px;padding:16px;margin-bottom:14px}
.card h3{font-size:11px;color:#8b91a0;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.stat{background:#1a1d24;border-radius:10px;padding:12px;text-align:center}
.stat .num{font-size:22px;font-weight:bold;font-family:monospace}
.stat .lbl{font-size:10px;color:#8b91a0;margin-top:3px;text-transform:uppercase}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:13px;font-weight:bold;cursor:pointer;margin-bottom:8px;transition:all .2s}
.btn:active{transform:scale(.97)}
.btn-red{background:#ff3b3b;color:#fff}
.btn-green{background:#00d084;color:#000}
.btn-orange{background:#ff6b35;color:#fff}
.btn-blue{background:#3d8bff;color:#fff}
.btn-gray{background:#2a2f3a;color:#aaa;font-size:12px}
#mapFrame{width:100%;height:260px;border:none;border-radius:10px;background:#111827}
.map-bar{display:flex;gap:8px;margin-top:10px}
.map-bar a{flex:1;text-align:center;background:#1a1d24;border-radius:8px;padding:9px;color:#3d8bff;font-size:12px;text-decoration:none;border:1px solid #2a2f3a}
.gps-info{background:#1a1d24;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-family:monospace;font-size:12px}
.gps-coords{color:#00d084;font-size:14px;font-weight:bold;margin-bottom:3px}
.gps-meta{color:#8b91a0;font-size:11px}
.event{background:#1a1d24;border-radius:8px;padding:10px 12px;margin-bottom:7px;border-left:3px solid #2a2f3a}
.event.locked{border-color:#ff3b3b}
.event.unlocked{border-color:#00d084}
.event.auto_lock{border-color:#ff6b35}
.event.photo_captured{border-color:#3d8bff}
.event.alarm{border-color:#ff6b35}
.event-type{font-size:10px;font-weight:bold;color:#8b91a0;text-transform:uppercase}
.event-msg{font-size:13px;margin-top:3px;color:#f0f2f7}
.event-time{font-size:10px;color:#5a6070;margin-top:2px;font-family:monospace}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.photo-item{background:#1a1d24;border-radius:8px;overflow:hidden}
.photo-item img{width:100%;display:block}
.photo-time{font-size:9px;color:#8b91a0;text-align:center;padding:4px;font-family:monospace}
.no-photo{display:flex;align-items:center;justify-content:center;height:70px;color:#5a6070;font-size:13px}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:bold}
.badge-red{background:rgba(255,59,59,.15);color:#ff3b3b;border:1px solid rgba(255,59,59,.3)}
.badge-green{background:rgba(0,208,132,.15);color:#00d084;border:1px solid rgba(0,208,132,.3)}
.msg-input{width:100%;background:#1a1d24;border:1px solid #2a2f3a;border-radius:8px;padding:10px;color:#fff;font-size:13px;margin-bottom:10px;resize:vertical;min-height:80px}
.preview-box{background:#fff;border-radius:10px;padding:20px;text-align:center;color:#111;margin-top:10px}
.preview-text{font-size:16px;font-weight:bold;line-height:1.6;white-space:pre-wrap}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1d24;border:1px solid #3d8bff;border-radius:10px;padding:12px 22px;font-size:13px;z-index:999;opacity:0;transition:all .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.device-id-badge{background:#1a1d24;border:1px solid #3d8bff;border-radius:8px;padding:6px 14px;font-family:monospace;font-size:13px;color:#3d8bff;font-weight:bold}
</style>
</head>
<body>

<nav class="nav">
  <div class="logo">
    Phone<span>Guard</span>
    <small>by Nomena</small>
  </div>
  <div style="font-size:12px;display:flex;align-items:center;gap:8px">
    <span class="dot" id="dotStatus"></span>
    <span id="srvStatus">Connexion...</span>
  </div>
</nav>

<div class="container">

  <!-- INFO APPAREIL -->
  <div class="card">
    <h3>Mon appareil</h3>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <span class="device-id-badge" id="showDeviceId">—</span>
      <span class="badge badge-green" id="devBadge">EN LIGNE</span>
    </div>
    <div style="font-size:11px;color:#8b91a0;font-family:monospace" id="lastSeen">En attente...</div>
  </div>

  <!-- STATS -->
  <div class="grid3">
    <div class="stat">
      <div class="num" id="statLocked" style="color:#ff3b3b;font-size:15px">NON</div>
      <div class="lbl">Bloque</div>
    </div>
    <div class="stat">
      <div class="num" id="statEvents" style="color:#ff6b35">0</div>
      <div class="lbl">Alertes</div>
    </div>
    <div class="stat">
      <div class="num" id="statPhotos" style="color:#3d8bff">0</div>
      <div class="lbl">Photos</div>
    </div>
  </div>

  <!-- GPS -->
  <div class="card">
    <h3>Position GPS</h3>
    <div class="gps-info">
      <div class="gps-coords" id="coordsText">En attente GPS...</div>
      <div class="gps-meta" id="gpsMaj">—</div>
    </div>
    <iframe id="mapFrame"
      src="https://www.openstreetmap.org/export/embed.html?bbox=47.4322%2C-19.0106%2C47.6322%2C-18.8106&layer=mapnik">
    </iframe>
    <div class="map-bar">
      <a id="linkGM" href="#" target="_blank">📍 Google Maps</a>
      <a id="linkWaze" href="#" target="_blank">🗺 Waze</a>
    </div>
  </div>

  <!-- COMMANDES -->
  <div class="card">
    <h3>Commandes</h3>
    <div class="grid2">
      <button class="btn btn-red"    onclick="sendCmd('lock')">🔒 BLOQUER</button>
      <button class="btn btn-green"  onclick="sendCmd('unlock')">🔓 DEBLOQUER</button>
      <button class="btn btn-orange" onclick="sendCmd('alarm')">🔊 ALARME</button>
      <button class="btn btn-blue"   onclick="sendCmd('photo')">📸 PHOTO</button>
    </div>
  </div>

  <!-- PHOTOS -->
  <div class="card">
    <h3>Photos du voleur</h3>
    <div id="photosList">
      <div class="no-photo">Aucune photo</div>
    </div>
    <button class="btn btn-gray" onclick="loadPhotos()" style="margin-top:8px">🔄 Actualiser</button>
  </div>

  <!-- MESSAGE -->
  <div class="card">
    <h3>Message ecran bloque</h3>
    <textarea class="msg-input" id="lockMsg">efa signale police
Raha tsy averinao ity telephone ity
satria misy GPS

atsoy 0341391434 tompony</textarea>
    <button class="btn btn-gray" onclick="updateMsg()">💾 Mettre a jour</button>
    <div class="preview-box">
      <div style="font-size:28px;margin-bottom:10px">🚨</div>
      <div class="preview-text" id="previewMsg">efa signale police</div>
    </div>
  </div>

  <!-- ALERTES -->
  <div class="card">
    <h3>Alertes recentes</h3>
    <div id="eventsList">
      <div style="color:#5a6070;font-size:13px;text-align:center;padding:16px">En attente...</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ID injecte par le serveur
var DEVICE   = '__DEVICE_ID__';
var SERVER   = window.location.origin;
var curLat   = 0;
var curLng   = 0;
var toastTmr = null;

// Afficher l'ID
document.getElementById('showDeviceId').textContent = DEVICE;
document.title = 'PhoneGuard — ' + DEVICE;

setInterval(refreshAll, 3000);
setInterval(loadPhotos, 15000);
refreshAll();
loadPhotos();

function refreshAll() {
    fetch(SERVER + '/api/status?device=' + DEVICE)
    .then(function(r){ return r.json(); })
    .then(function(dev){
        document.getElementById('dotStatus').className = 'dot';
        document.getElementById('srvStatus').textContent = 'Connecte';
        renderDevice(dev);
    })
    .catch(function(){
        document.getElementById('dotStatus').className = 'dot off';
        document.getElementById('srvStatus').textContent = 'Hors ligne';
    });
}

function renderDevice(dev) {
    var badge = document.getElementById('devBadge');
    var lkd   = document.getElementById('statLocked');
    if (dev.locked) {
        badge.className   = 'badge badge-red';
        badge.textContent = 'BLOQUE';
        lkd.textContent   = 'OUI';
        lkd.style.color   = '#ff3b3b';
    } else {
        badge.className   = 'badge badge-green';
        badge.textContent = 'EN LIGNE';
        lkd.textContent   = 'NON';
        lkd.style.color   = '#00d084';
    }
    document.getElementById('statEvents').textContent =
        dev.events ? dev.events.length : 0;
    if (dev.lastSeen) {
        document.getElementById('lastSeen').textContent =
            'Derniere activite : ' + new Date(dev.lastSeen).toLocaleString('fr-FR');
        document.getElementById('gpsMaj').textContent =
            'MAJ : ' + new Date(dev.lastSeen).toLocaleTimeString('fr-FR');
    }
    if (dev.lat && dev.lng && dev.lat != 0 && dev.lng != 0) {
        var la = parseFloat(dev.lat);
        var lo = parseFloat(dev.lng);
        document.getElementById('coordsText').textContent =
            la.toFixed(6) + ' , ' + lo.toFixed(6);
        if (la !== curLat || lo !== curLng) {
            curLat = la; curLng = lo;
            var d    = 0.005;
            var bbox = (lo-d)+'%2C'+(la-d)+'%2C'+(lo+d)+'%2C'+(la+d);
            document.getElementById('mapFrame').src =
                'https://www.openstreetmap.org/export/embed.html?bbox='+bbox+
                '&layer=mapnik&marker='+la+'%2C'+lo;
            document.getElementById('linkGM').href =
                'https://maps.google.com/?q='+la+','+lo;
            document.getElementById('linkWaze').href =
                'https://waze.com/ul?ll='+la+','+lo+'&navigate=yes';
        }
    } else {
        document.getElementById('coordsText').textContent = 'GPS en attente...';
    }
    if (dev.events && dev.events.length > 0) {
        var icons = {locked:'🔒',unlocked:'🔓',auto_lock:'⚠️',
                     photo_captured:'📸',alarm:'🔊'};
        var html  = '';
        for (var i = 0; i < Math.min(dev.events.length, 10); i++) {
            var ev = dev.events[i];
            var t  = ev.type || '';
            html += '<div class="event '+t+'">' +
                '<div class="event-type">'+(icons[t]||'📡')+' '+t.toUpperCase()+'</div>'+
                '<div class="event-msg">'+(ev.message||t)+'</div>'+
                '<div class="event-time">'+
                (ev.time?new Date(ev.time).toLocaleString('fr-FR'):'')+
                '</div></div>';
        }
        document.getElementById('eventsList').innerHTML = html;
    }
}

function loadPhotos() {
    fetch(SERVER + '/api/photos?device=' + DEVICE)
    .then(function(r){ return r.json(); })
    .then(function(list){
        document.getElementById('statPhotos').textContent = list.length;
        if (!list || list.length === 0) {
            document.getElementById('photosList').innerHTML =
                '<div class="no-photo">Aucune photo</div>';
            return;
        }
        var html = '<div class="photo-grid">';
        for (var i = 0; i < list.length; i++) {
            var p = list[i];
            var t = p.time ? new Date(p.time).toLocaleTimeString('fr-FR') : '';
            html += '<div class="photo-item">' +
                '<img src="data:image/jpeg;base64,'+p.data+'" />' +
                '<div class="photo-time">'+t+'</div>' +
                '</div>';
        }
        html += '</div>';
        document.getElementById('photosList').innerHTML = html;
    })
    .catch(function(){});
}

function sendCmd(cmd) {
    var labels = {
        lock:   '🔒 Telephone bloque !',
        unlock: '🔓 Telephone debloque !',
        alarm:  '🔊 Alarme declenchee !',
        photo:  '📸 Photo en cours...'
    };
    fetch(SERVER + '/api/command', {
        method:  'POST',
        headers: {'Content-Type':'application/json'},
        body:    JSON.stringify({device: DEVICE, command: cmd})
    })
    .then(function(r){ return r.json(); })
    .then(function(){
        showToast(labels[cmd] || 'Commande envoyee');
        setTimeout(refreshAll, 2000);
        if (cmd === 'photo') setTimeout(loadPhotos, 8000);
    })
    .catch(function(){ showToast('Erreur connexion'); });
}

function updateMsg() {
    var msg = document.getElementById('lockMsg').value;
    document.getElementById('previewMsg').textContent = msg;
    fetch(SERVER + '/api/command', {
        method:  'POST',
        headers: {'Content-Type':'application/json'},
        body:    JSON.stringify({device: DEVICE, command:'message', message:msg})
    }).then(function(){ showToast('Message mis a jour !'); });
}

document.getElementById('lockMsg').addEventListener('input', function() {
    document.getElementById('previewMsg').textContent = this.value;
});

function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTmr);
    toastTmr = setTimeout(function(){ t.classList.remove('show'); }, 3500);
}
</script>
</body>
  </html>
